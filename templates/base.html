<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}projectCatalyst{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn {
            transition: all 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .btn:active {
            transform: translateY(0);
        }
        .card {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border-color: #535353;
        }
        .nav-link {
            transition: all 0.2s ease;
            position: relative;
        }
        .nav-link:hover {
        color: #fff !important;
        }
        .nav-link::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background: #fff;
        transition: width 0.9s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .navbar-toggler {
            transition: all 0.5s ease;
            border: none !important;
        }
        .navbar-toggler:hover {
            transform: rotate(180deg);
        }
        .navbar-toggler:focus {
            box-shadow: none !important;
        }
        .navbar-collapse {
            background-color: #2f2f69;
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
            width: 100%;
            margin-left: -12px;
            margin-right: -12px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">projectCatalyst</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navmenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/products">Produk</a></li>
                <li class="nav-item"><a class="nav-link" href="/orders">Order</a></li>
                <li class="nav-item"><a class="nav-link" href="/cashflow">Cashflow</a></li>
                <li class="nav-item"><a class="nav-link" href="/ingredients">Bahan Baku</a></li>
                <li class="nav-item"><a class="nav-link" href="/reports">Laporan</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
